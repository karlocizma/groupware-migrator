# nginx reverse proxy configuration for Groupware Migrator
#
# Handles:
#   - HTTPS termination (port 443)
#   - HTTP → HTTPS redirect (port 80)
#   - Correct proxy headers so FastAPI sees real client IPs (used by rate limiter)
#   - SSE streaming (proxy_buffering off, X-Accel-Buffering: no)
#   - Large request bodies for CSV batch uploads

server {
    listen 80;
    server_name migrator.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name migrator.example.com;

    # TLS certificates — replace with your actual cert paths
    ssl_certificate     /etc/letsencrypt/live/migrator.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/migrator.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers (supplement those set by the app itself)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow larger request bodies for CSV batch uploads
    client_max_body_size 16M;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Required for correct client IP detection (used by the login rate limiter)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_http_version 1.1;

        # SSE: disable buffering so events are streamed immediately
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;

        # Keep-alive for SSE connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # WebSocket upgrade passthrough (not currently used but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
